[package]
name = "sosaltix2"
version = "0.1.0"
authors = ["ktoto <t.me/ktoto640kg>"]
edition = "2024"

[profile.dev]
panic = "abort" 

[profile.release]
panic = "abort" 

[dependencies]
bootloader = { version = "0.9.34", features = ["map_physical_memory"]}
volatile  = "0.2.6"
spin = "0.5.2"
x86_64 = "0.14.2"
uart_16550 = "0.2.0"
pic8259 = "0.10.1"
pc-keyboard = "0.7.0"

[dependencies.lazy_static]
version = "1.0"
features = ["spin_no_std"]

[[bin]]
name = "sosaltix2"
test = true
bench = false

[package.metadata.bootimage]
test-args = [
    "-device", "isa-debug-exit,iobase=0xf4,iosize=0x04", "-serial", "stdio",
    "-display", "none"
]
test-success-exit-code = 33 
test-timeout = 120 

[[test]]
name = "stack_overflow"
harness = false

[[test]]
name = "should_panic"
harness = false