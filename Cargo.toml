[package]
name = "sosaltix2"
version = "0.1.0"
authors = ["ktoto <t.me/ktoto640kg>"]
edition = "2024"

[profile.dev]
panic = "abort" 

[profile.release]
panic = "abort" 

[dependencies]
bootloader = "0.9.34"
volatile = "0.2.6"
spin = "0.5.2"


[target.'cfg(target_os = "none")']
runner = "bootimage runner"

[dependencies.lazy_static]
version = "1.0"
features = ["spin_no_std"]
